name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run python -m pytest --tb=short -q

      - name: Type check
        run: uv run mypy grapheneos_flasher

      - name: Check formatting
        run: |
          uv run black --check grapheneos_flasher tests
          uv run isort --check grapheneos_flasher tests

      - name: Lint
        run: uv run flake8 grapheneos_flasher tests
